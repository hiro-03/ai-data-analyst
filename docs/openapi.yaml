paths:
  /weather:
    post:
      summary: Weather inference API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lat
                - lon
              properties:
                lat:
                  type: number
                  minimum: -90
                  maximum: 90
                lon:
                  type: number
                  minimum: -180
                  maximum: 180
      responses:
        "200":
          description: Successful inference
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  station_id:
                    type: string
                  lat:
                    type: number
                  lon:
                    type: number
                  temperature:
                    type: number
                  confidence:
                    type: number
                  timestamp:
                    type: string
        "400":
          description: Invalid input
        "500":
          description: Internal inference error