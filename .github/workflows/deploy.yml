name: Deploy SAM Application

# ============================================================
# GitHub OIDC Authentication (one-time setup already complete)
# ============================================================
# IAM OIDC provider: arn:aws:iam::476963918877:oidc-provider/token.actions.githubusercontent.com
# IAM role:          arn:aws:iam::476963918877:role/github-actions-ai-data-analyst
#
# GitHub Secrets required:
#   AWS_ROLE_ARN_STG      - IAM role ARN for staging
#   AWS_ROLE_ARN_PROD     - IAM role ARN for production
#
# Optional secrets (fall back to samconfig.toml defaults if not set):
#   ALARM_EMAIL           - prod alert email
#   ALARM_EMAIL_STG       - staging alert email
#   BEDROCK_AGENT_ARN     - prod Bedrock Agent ARN
#   BEDROCK_AGENT_ARN_STG - staging Bedrock Agent ARN
#
# Smoke test secrets (required for staging E2E gate):
#   STG_SMOKE_USER_EMAIL    - Cognito test user email
#   STG_SMOKE_USER_PASSWORD - Cognito test user password
#
# IAM Role separation rationale:
#   Each environment uses the same role today; the trust policy is scoped to
#   repo:hiro-03/ai-data-analyst:* so no other repository can assume it.
#   To further harden, scope the trust to environment:staging / environment:production
#   and assign separate roles with least-privilege policies per environment.
# ============================================================

on:
  push:
    branches: [ main ]

  # Allow manual rollback / hotfix deploys from the Actions UI.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (stg | prod | both)"
        required: true
        default: "both"
        type: choice
        options: [ stg, prod, both ]

permissions:
  id-token: write   # OIDC トークン発行に必要
  contents: read
  actions: read     # environment-protected ジョブからのアーティファクト参照に必要

# ------------------------------------------------------------------------------
# Job 1 - CI gate: unit tests + lint + build
# Runs on every push to main regardless of target environment.
# ------------------------------------------------------------------------------
jobs:
  ci:
    name: CI (test + lint + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Pin to SHA to guard against tag-mutable supply-chain attacks.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2
        # AWS 認証ステップは不要。sam validate --lint と sam build はローカルファイルのみで動作し、
        # AWS への通信を一切行わない。クレデンシャルの assume は deploy-stg / deploy-prod のみ。

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ --cov=lambdas --cov=layers --cov-report=xml --cov-fail-under=80

      - name: Static type check (mypy)
        run: mypy layers/fishing_common/python/fishing_common/ lambdas/ --ignore-missing-imports --explicit-package-bases --no-error-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml

      - name: Install layer dependencies for Linux runtime
        run: |
          pip install \
            -r layers/fishing_common/requirements.txt \
            -t layers/fishing_common/python/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --upgrade

      - name: SAM validate (with lint)
        run: sam validate --template-file template.yaml --lint

      - name: SAM build (validate only – deploy jobs rebuild independently)
        run: sam build

# ------------------------------------------------------------------------------
# Job 2 - Deploy to Staging
# Runs automatically after CI passes.  No manual approval required.
# ------------------------------------------------------------------------------
  deploy-stg:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'stg' || github.event.inputs.environment == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2

      - name: Configure AWS credentials (OIDC – staging role)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STG }}
          aws-region: ap-northeast-1

      - name: Install layer dependencies for Linux runtime
        run: |
          pip install \
            -r layers/fishing_common/requirements.txt \
            -t layers/fishing_common/python/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --upgrade

      - name: SAM build
        run: sam build

      - name: SAM deploy to staging
        run: |
          sam deploy \
            --config-env stg \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AlarmEmail="${{ secrets.ALARM_EMAIL_STG || 'stg-ops@example.com' }}" \
              BedrockAgentArn="${{ secrets.BEDROCK_AGENT_ARN_STG || 'arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0' }}" \
              Stage="stg"

# ------------------------------------------------------------------------------
# Job 3 - Staging Smoke Test
# Runs after stg deploy; gates production.  Queries SAM outputs to obtain the
# staging API URL and Cognito Pool/Client IDs, then exercises the /fishing
# endpoint end-to-end with a known-good payload.
# On failure the workflow stops before prod is touched.
# ------------------------------------------------------------------------------
  smoke-test-stg:
    name: Smoke test Staging
    needs: deploy-stg
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC – staging role)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STG }}
          aws-region: ap-northeast-1

      - name: Install smoke test dependencies
        run: pip install boto3

      - name: Run staging smoke test
        env:
          STACK_NAME: ai-data-analyst-fishing-stg
          AWS_REGION: ap-northeast-1
          COGNITO_PASSWORD: ${{ secrets.STG_SMOKE_USER_PASSWORD }}
          COGNITO_USERNAME: ${{ secrets.STG_SMOKE_USER_EMAIL }}
        run: |
          python scripts/smoke_test.py \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --username "$COGNITO_USERNAME" \
            --password "$COGNITO_PASSWORD"

# ------------------------------------------------------------------------------
# Job 4 - Deploy to Production
# Requires manual approval via a GitHub Environment with "required reviewers".
# Configure: Settings -> Environments -> production -> add Required reviewers.
# ------------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: smoke-test-stg
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2

      - name: Configure AWS credentials (OIDC – production role)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ap-northeast-1

      - name: Install layer dependencies for Linux runtime
        run: |
          pip install \
            -r layers/fishing_common/requirements.txt \
            -t layers/fishing_common/python/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --upgrade

      - name: SAM build
        run: sam build

      - name: SAM deploy to production
        run: |
          sam deploy \
            --config-env default \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AlarmEmail="${{ secrets.ALARM_EMAIL || 'ops@example.com' }}" \
              BedrockAgentArn="${{ secrets.BEDROCK_AGENT_ARN || 'arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0' }}" \
              Stage="prod"
