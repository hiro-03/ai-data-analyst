name: Deploy SAM Application

# ============================================================
# GitHub OIDC 認証（初期セットアップ済み）
# ============================================================
# IAM OIDC プロバイダー: arn:aws:iam::476963918877:oidc-provider/token.actions.githubusercontent.com
# IAM ロール:          arn:aws:iam::476963918877:role/github-actions-ai-data-analyst
#
# 必須の GitHub Secrets:
#   AWS_ROLE_ARN_STG      - ステージング用 IAM ロール ARN
#   AWS_ROLE_ARN_PROD     - 本番用 IAM ロール ARN
#
# 任意（未設定なら template.yaml の BedrockAgentArn 既定に合わせた agent/* を parameter-overrides で渡す）:
#   ALARM_EMAIL           - 本番アラートメール
#   ALARM_EMAIL_STG       - ステージングアラートメール
#   BEDROCK_AGENT_ARN     - 本番 Bedrock エージェント ARN（InvokeAgent の IAM スコープ用）
#   BEDROCK_AGENT_ARN_STG - ステージング Bedrock エージェント ARN
#
# スモークテスト用（ステージング E2E ゲートに必須）:
#   STG_SMOKE_USER_EMAIL    - Cognito テストユーザーのメール
#   STG_SMOKE_USER_PASSWORD - Cognito テストユーザーのパスワード
#
# IAM ロール分離の考え方:
#   現状は環境ごとに同一ロールを使用。信頼ポリシーは repo:hiro-03/ai-data-analyst:* に限定済みで
#   他リポジトリからは引き受け不可。さらに厳格化するなら environment:staging / environment:production
#   にスコープし、環境ごとに最小権限ロールを割り当てる。
# ============================================================

on:
  push:
    branches: [ main ]

  # Actions UI から手動ロールバック / ホットフィックスデプロイを許可
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先（stg | prod | both）"
        required: true
        default: "both"
        type: choice
        options: [ stg, prod, both ]

permissions:
  id-token: write   # OIDC トークン発行に必要
  contents: read
  actions: read     # environment-protected ジョブからのアーティファクト参照に必要

# 連続 push で複数ワークフローが同じ CloudFormation スタックへ sam deploy すると、
# 一方の ChangeSet が OBSOLETE になり ExecuteChangeSet が失敗することがある。
# デプロイジョブのみ concurrency で直列化し、CI（ci ジョブ）は並列のままとする。

# ------------------------------------------------------------------------------
# ジョブ 1 - CI ゲート: 単体テスト + リント + ビルド
# main へのプッシュのたびに実行（デプロイ先に依存しない）
# ------------------------------------------------------------------------------
jobs:
  ci:
    name: CI (test + lint + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # タグ可変によるサプライチェーン攻撃を避けるため SHA で固定
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2
        # AWS 認証ステップは不要。sam validate --lint と sam build はローカルファイルのみで動作し、
        # AWS への通信を一切行わない。クレデンシャルの assume は deploy-stg / deploy-prod のみ。

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ --cov=lambdas --cov=layers --cov-report=xml --cov-fail-under=80

      - name: Static type check (mypy)
        run: mypy layers/fishing_common/fishing_common/ lambdas/ --ignore-missing-imports --explicit-package-bases --no-error-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml

      - name: SAM validate (with lint)
        run: sam validate --template-file template.yaml --lint

      - name: SAM build (検証のみ – デプロイジョブは別途ビルド)
        run: sam build

      - name: Virtual CTO サマリー（手動チェックリストの可視化）
        if: success()
        run: python scripts/virtual_cto_gate.py --github-summary

# ------------------------------------------------------------------------------
# ジョブ 2 - ステージングへデプロイ
# CI 成功後に自動実行。手動承認は不要。
# ------------------------------------------------------------------------------
  deploy-stg:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: sam-deploy-stg-${{ github.repository }}
      cancel-in-progress: false
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'stg' || github.event.inputs.environment == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2

      - name: Configure AWS credentials (OIDC – staging role)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STG }}
          aws-region: ap-northeast-1

      - name: SAM build
        run: sam build

      - name: SAM deploy to staging
        run: |
          sam deploy \
            --config-env stg \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DeployTimestamp="${{ github.sha }}" \
              AlarmEmail="${{ secrets.ALARM_EMAIL_STG || 'stg-ops@example.com' }}" \
              BedrockAgentArn="${{ secrets.BEDROCK_AGENT_ARN_STG || 'arn:aws:bedrock:ap-northeast-1:476963918877:agent/*' }}" \
              Stage="stg"

# ------------------------------------------------------------------------------
# ジョブ 3 - ステージングスモークテスト
# stg デプロイ後に実行し、本番へのゲートとする。SAM 出力から API URL と
# Cognito プール/クライアント ID を取得し、既知の良いペイロードで /fishing を E2E 検証。
# 失敗時は本番デプロイ前にワークフローを止める。
# ------------------------------------------------------------------------------
  smoke-test-stg:
    name: Smoke test Staging
    needs: deploy-stg
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC – staging role)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STG }}
          aws-region: ap-northeast-1

      - name: Install smoke test dependencies
        run: pip install boto3

      - name: Run staging smoke test
        env:
          STACK_NAME: ai-data-analyst-fishing-stg
          AWS_REGION: ap-northeast-1
          COGNITO_PASSWORD: ${{ secrets.STG_SMOKE_USER_PASSWORD }}
          COGNITO_USERNAME: ${{ secrets.STG_SMOKE_USER_EMAIL }}
        run: |
          python scripts/smoke_test.py \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --username "$COGNITO_USERNAME" \
            --password "$COGNITO_PASSWORD"

# ------------------------------------------------------------------------------
# ジョブ 4 - 本番デプロイ
# 「必須レビュアー」付き GitHub Environment による手動承認が必要。
# 設定: Settings -> Environments -> production -> Required reviewers を追加
# ------------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: smoke-test-stg
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: sam-deploy-prod-${{ github.repository }}
      cancel-in-progress: false
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133  # v2

      - name: Configure AWS credentials (OIDC – production role)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ap-northeast-1

      - name: SAM build
        run: sam build

      - name: SAM deploy to production
        run: |
          sam deploy \
            --config-env default \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DeployTimestamp="${{ github.sha }}" \
              AlarmEmail="${{ secrets.ALARM_EMAIL || 'ops@example.com' }}" \
              BedrockAgentArn="${{ secrets.BEDROCK_AGENT_ARN || 'arn:aws:bedrock:ap-northeast-1:476963918877:agent/*' }}" \
              Stage="prod"
