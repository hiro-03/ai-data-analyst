services:
  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      - ./dynamodb:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"

  weather-observation-api:
    build:
      context: lambda/weather-observation-api
      dockerfile: Dockerfile
    image: ai-data-analyst-weather-observation-api
    container_name: weather-observation-api
    ports:
      - "9000:8080"
    environment:
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
      AWS_DEFAULT_REGION: "ap-northeast-1"
      DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
    depends_on:
      - dynamodb-local

  weather-fallback-api:
    build:
      context: lambda/weather-fallback-api
      dockerfile: Dockerfile
    image: ai-data-analyst-weather-fallback-api
    container_name: weather-fallback-api
    ports:
      - "9001:8080"
    environment:
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
      AWS_DEFAULT_REGION: "ap-northeast-1"
      DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
    depends_on:
      - dynamodb-local

  stepfunctions-local:
    image: amazon/aws-stepfunctions-local
    container_name: stepfunctions-local
    ports:
      - "8083:8083"
    environment:
      AWS_DEFAULT_REGION: "ap-northeast-1"
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
      AWS_SFN_LOCAL: "true"
      SFN_MOCK_LAMBDA: "true"
      LAMBDA_ENDPOINT: "http://weather-observation-api:8080"
    depends_on:
      - dynamodb-local
      - weather-observation-api
      - weather-fallback-api