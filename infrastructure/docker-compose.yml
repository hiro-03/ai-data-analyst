version: "3.9"

services:
  weather_observation_api:
    build:
      context: ../lambdas/weather_observation_api
      dockerfile: Dockerfile
    container_name: weather_observation_api
    ports:
      - "9001:8080"
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: ap-northeast-1
    volumes:
      - ../lambdas/weather_observation_api:/var/task

  weather_fallback_api:
    build:
      context: ../lambdas/weather_fallback_api
      dockerfile: Dockerfile
    container_name: weather_fallback_api
    ports:
      - "9002:8080"
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: ap-northeast-1
    volumes:
      - ../lambdas/weather_fallback_api:/var/task

  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      - ../dynamodb:/home/dynamodblocal/data