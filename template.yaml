AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Weather API with Step Functions Sync Execution v2

Parameters:
  DeployTimestamp:
    Type: String
    Default: "initial"

Resources:
  ########################################
  # API Gateway OpenAPI
  ########################################
  WeatherApi20260323:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: WeatherRestApi
      Body:
        Fn::Sub: |
          swagger: "2.0"
          info:
            title: Weather Observation API
            version: "1.0"

          paths:
            /weather:
              post:
                consumes:
                  - application/json
                produces:
                  - application/json

                parameters:
                  - in: body
                    name: body
                    required: true
                    schema:
                      type: object
                      properties:
                        lat:
                          type: number
                        lon:
                          type: number
                      required:
                        - lat
                        - lon

                responses:
                  "200":
                    description: Successful execution
                    schema:
                      type: object
                      properties:
                        station_id:
                          type: string
                        temperature:
                          type: number
                        humidity:
                          type: number
                        timestamp:
                          type: string

                x-amazon-apigateway-integration:
                  type: aws
                  httpMethod: POST
                  uri: arn:aws:apigateway:${AWS::Region}:states:action/StartSyncExecution
                  credentials: arn:aws:iam::${AWS::AccountId}:role/ApiGatewayStepFunctionsRole
                  passthroughBehavior: when_no_templates
                  requestTemplates:
                    application/json: |
                      {
                        "stateMachineArn": "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${AWS::StackName}-WeatherObservationStateMachine",
                        "input": "$util.escapeJavaScript($input.body)"
                      }
                  responses:
                    "200":
                      statusCode: "200"
                      responseTemplates:
                        application/json: |
                          #set($rawOutput = $input.path('$.output'))
                          #set($parsedOutput = $util.parseJson($rawOutput))
                          #set($payloadBody = $parsedOutput.Payload.body)
                          #if($payloadBody && $payloadBody.startsWith("{"))
                            $util.parseJson($payloadBody)
                          #else
                            $payloadBody
                          #end

  ########################################
  # IAM Role for API Gateway → Step Functions
  ########################################
  ApiGatewayStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayStepFunctionsRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewayStepFunctionsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                  - states:StartSyncExecution
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${AWS::StackName}-WeatherObservationStateMachine"

  ########################################
  # Step Functions EXPRESS
  ########################################
  WeatherObservationStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-WeatherObservationStateMachineRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WeatherObservationStateMachinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt WeatherObservationLambda.Arn

  WeatherObservationStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${AWS::StackName}-WeatherObservationStateMachine"
      StateMachineType: EXPRESS
      RoleArn: !GetAtt WeatherObservationStateMachineRole.Arn
      DefinitionString:
        Fn::Sub:
          - |
            {
              "StartAt": "InvokeWeatherLambda",
              "States": {
                "InvokeWeatherLambda": {
                  "Type": "Task",
                  "Resource": "arn:aws:states:::lambda:invoke",
                  "Parameters": {
                    "FunctionName": "${LambdaArn}",
                    "Payload.$": "$"
                  },
                  "End": true
                }
              }
            }
          - { LambdaArn: !GetAtt WeatherObservationLambda.Arn }

  ########################################
  # DynamoDB
  ########################################
  StationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Stations"
      AttributeDefinitions:
        - AttributeName: station_id
          AttributeType: S
      KeySchema:
        - AttributeName: station_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  WeatherObservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-WeatherObservations"
      AttributeDefinitions:
        - AttributeName: station_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: station_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  ########################################
  # Lambda
  ########################################
  WeatherObservationLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-weather_observation_api"
      Handler: lambda_function.lambda_handler
      Runtime: python3.11
      CodeUri: lambdas/weather_observation_api/
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          STATIONS_TABLE: !Ref StationsTable
          WEATHER_OBSERVATIONS_TABLE: !Ref WeatherObservationsTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref StationsTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
              Resource:
                - !GetAtt StationsTable.Arn
                - !GetAtt WeatherObservationsTable.Arn

  ########################################
  # Deployment & Stage
  ########################################
  WeatherApiDeployment20260324:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - WeatherApi20260323
    Properties:
      RestApiId: !Ref WeatherApi20260323
      Description: !Sub "Deployment for prod stage - ${DeployTimestamp}"

  WeatherApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref WeatherApi20260323
      DeploymentId: !Ref WeatherApiDeployment20260324
      MethodSettings:
        - LoggingLevel: INFO
          DataTraceEnabled: true
          ResourcePath: "/*"
          HttpMethod: "*"

Outputs:
  WeatherApiUrl:
    Description: "Invoke URL for Weather API"
    Value: !Sub "https://${WeatherApi20260323}.execute-api.${AWS::Region}.amazonaws.com/prod/weather"

  WeatherObservationLambdaName:
    Description: "Lambda function name"
    Value: !Ref WeatherObservationLambda