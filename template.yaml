AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Weather API with Step Functions Sync Execution

Resources:
  ########################################
  # API Gateway（OpenAPI を正として読み込む）
  ########################################
  WeatherApi20260323:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: WeatherRestApi
      Body:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: ./openapi.yaml

  ########################################
  # IAM Role for API Gateway → Step Functions
  ########################################
  ApiGatewayStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayStepFunctionsRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewayStepFunctionsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                  - states:StartSyncExecution
                Resource: "*"

  ########################################
  # Step Functions (EXPRESS)
  ########################################
  WeatherObservationStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: WeatherObservationStateMachineRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WeatherObservationStateMachinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  WeatherObservationStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: WeatherObservationStateMachine
      StateMachineType: EXPRESS
      RoleArn: !GetAtt WeatherObservationStateMachineRole.Arn
      DefinitionString:
        Fn::Sub: |
          {
            "StartAt": "InvokeWeatherLambda",
            "States": {
              "InvokeWeatherLambda": {
                "Type": "Task",
                "Resource": "arn:aws:states:::lambda:invoke",
                "Parameters": {
                  "FunctionName": "weather_observation_api",
                  "Payload.$": "$"
                },
                "End": true
              }
            }
          }

  ########################################
  # Lambda（WeatherObservationLambda）
  ########################################
  WeatherObservationLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather_observation_api
      Handler: app.lambda_handler
      Runtime: python3.11
      CodeUri: lambdas/weather_observation_api/
      Timeout: 30
      MemorySize: 512
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: Stations
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: arn:aws:dynamodb:ap-northeast-1:476963918877:table/Stations

  ########################################
  # DynamoDB（WeatherObservations）
  ########################################
  WeatherObservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WeatherObservations
      AttributeDefinitions:
        - AttributeName: station_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: station_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  ########################################
  # Deployment & Stage（OpenAPI 方式に合わせて修正）
  ########################################
  WeatherApiDeployment20260324:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - WeatherApi20260323
    Properties:
      RestApiId: !Ref WeatherApi20260323
      Description: "Deployment for prod stage"

  WeatherApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref WeatherApi20260323
      DeploymentId: !Ref WeatherApiDeployment20260324
      MethodSettings:
        - LoggingLevel: INFO
          DataTraceEnabled: true
          ResourcePath: "/*"
          HttpMethod: "*"