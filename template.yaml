AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Weather API with Step Functions Sync Execution

Resources:
  ########################################
  # API Gateway
  ########################################
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: WeatherRestApi
      EndpointConfiguration:
        Types:
          - REGIONAL

  RestApiResourceWeather:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: weather

  ########################################
  # IAM Role for API Gateway → Step Functions
  ########################################
  ApiGatewayStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayStepFunctionsRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewayStepFunctionsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                  - states:StartSyncExecution
                Resource: "*"

  ########################################
  # Step Functions (EXPRESS)
  ########################################
  WeatherObservationStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: WeatherObservationStateMachineRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WeatherObservationStateMachinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  WeatherObservationStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: WeatherObservationStateMachine
      StateMachineType: EXPRESS
      RoleArn: !GetAtt WeatherObservationStateMachineRole.Arn
      DefinitionString:
        Fn::Sub: |
          {
            "StartAt": "InvokeWeatherLambda",
            "States": {
              "InvokeWeatherLambda": {
                "Type": "Task",
                "Resource": "arn:aws:states:::lambda:invoke",
                "Parameters": {
                  "FunctionName": "weather_observation_api",
                  "Payload.$": "$"
                },
                "End": true
              }
            }
          }

  ########################################
  # API Gateway Method → StartSyncExecution
  # ＋ レスポンス整形（Mapping Template）
  ########################################
  RestApiMethodWeatherPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RestApiResourceWeather
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:states:action/StartSyncExecution
        Credentials: !GetAtt ApiGatewayStepFunctionsRole.Arn
        RequestTemplates:
          application/json:
            Fn::Sub:
              - |
                {
                  "input": "$util.escapeJavaScript($input.body)",
                  "stateMachineArn": "${StateMachineArn}"
                }
              - { StateMachineArn: !GetAtt WeatherObservationStateMachine.Arn }

        ########################################
        # ★ 修正済み ResponseTemplates（重要）
        ########################################
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "body": $inputRoot
                }

      MethodResponses:
        - StatusCode: 200

  ########################################
  # Lambda（WeatherObservationLambda）
  ########################################
  WeatherObservationLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather_observation_api
      Handler: app.lambda_handler
      Runtime: python3.11
      CodeUri: lambdas/weather_observation_api/
      Timeout: 30
      MemorySize: 512
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: Stations
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: arn:aws:dynamodb:ap-northeast-1:476963918877:table/Stations

  ########################################
  # DynamoDB（WeatherObservations）
  ########################################
  WeatherObservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WeatherObservations
      AttributeDefinitions:
        - AttributeName: station_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: station_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  ########################################
  # Deployment & Stage（Logical ID を変更して強制更新）
  ########################################
  RestApiDeployment20260312:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RestApiMethodWeatherPost
    Properties:
      RestApiId: !Ref RestApi
      Description: "Deployment for prod stage"

  RestApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref RestApi
      DeploymentId: !Ref RestApiDeployment20260312
      MethodSettings:
        - LoggingLevel: INFO
          DataTraceEnabled: true
          ResourcePath: "/*"
          HttpMethod: "*"