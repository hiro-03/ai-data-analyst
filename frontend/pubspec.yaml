name: fishing_app
description: "Flutter 製の釣りアドバイザーアプリ。"
# 次の行により、誤って pub.dev に公開されないようにします（非公開パッケージ向け）。
publish_to: 'none' # 公開する場合はこの行を削除

# アプリのバージョンとビルド番号。
# バージョンは 1.2.43 のようにドット区切り、オプションで + の後にビルド番号。
# Flutter ビルド時に --build-name / --build-number で上書き可能。
# Android では versionName / versionCode、iOS では CFBundleShortVersionString / CFBundleVersion に対応。
# Android: https://developer.android.com/studio/publish/versioning
# iOS: https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# Windows では製品・ファイル版の major/minor/patch とビルドサフィックスに使用。
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# 依存パッケージ。最新版へ上げるには `flutter pub upgrade --major-versions`、
# 手動なら下のバージョンを変更。新しさの確認は `flutter pub outdated`。
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 下の flutter_lints は推奨リントの集合。有効化はルートの `analysis_options.yaml` で行います。
  flutter_lints: ^5.0.0

# Dart の pubspec 一般: https://dart.dev/tools/pub/pubspec

# 以下は Flutter パッケージ向けのセクション。
flutter:

  # Material Icons フォントをアプリに同梱し、material Icons でアイコンを使えるようにする。
  uses-material-design: true

  # アセットを追加する例:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # 解像度別バリアントについて: https://flutter.dev/to/resolution-aware-images
  # パッケージ依存のアセット: https://flutter.dev/to/asset-from-package

  # カスタムフォントはこの flutter セクションに fonts を追加。
  # 各エントリは family と fonts（asset パス等）を持つ。
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # パッケージのフォント利用: https://flutter.dev/to/font-from-package
